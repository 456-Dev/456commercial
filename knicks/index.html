<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta property="og:title" content="The Knicks Trophy Room">
<meta property="og:description" content="Submit your craziest Knicks tapes. Climb the podium. Watch the legends.">

<link rel="apple-touch-icon" href="/favicon160x160.png">

<style>
  :root{
    --bg:#140d06; --wood:#241810; --panel:#2c1f12; --panel2:#3a2a18;
    --cream:#f1e4c6; --cream2:#e6d4ac; --ink:#211608;
    --gold:#d4af37; --gold-lt:#f6e29a; --gold-dk:#9a7d2e;
    --orange:#c1440e; --blue:#1d4e89; --line:rgba(212,175,55,.28);
    font-size:16px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
  body{font-family:"Oswald","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--cream);line-height:1.4;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
  body.locked{overflow:hidden;}
  img,video{max-width:100%;display:block;}
  a{color:inherit;}
  .wrap{width:100%;max-width:1040px;margin:0 auto;padding:0 18px;}
  .display{font-family:"Alfa Slab One",Georgia,serif;font-weight:400;}
  .gold{color:var(--gold);}

  /* ---------- header ---------- */
  header.bar{position:sticky;top:0;z-index:40;background:rgba(20,13,6,.82);backdrop-filter:blur(9px);border-bottom:1px solid var(--line);}
  .bar-inner{max-width:1040px;margin:0 auto;padding:9px 16px;display:flex;align-items:center;gap:10px;}
  .seal{width:32px;height:32px;flex:0 0 auto;}
  .wm{font-weight:700;text-transform:uppercase;letter-spacing:.16em;font-size:.78rem;color:var(--cream);}
  .wm b{color:var(--gold);}
  .bar .spacer{flex:1;}
  .navbtn{font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:.76rem;text-decoration:none;cursor:pointer;
    color:var(--cream);padding:8px 13px;border-radius:5px;border:1px solid var(--line);background:transparent;}
  .navbtn.gold{color:var(--ink);background:linear-gradient(180deg,var(--gold-lt),var(--gold));border-color:var(--gold-dk);box-shadow:0 2px 0 var(--gold-dk);}
  .navbtn.gold:active{transform:translateY(2px);box-shadow:0 0 0 var(--gold-dk);}

  /* ============ 3D TROPHY ROOM ============ */
  .room{position:relative;height:min(70vh,620px);min-height:480px;overflow:hidden;perspective:1100px;perspective-origin:50% 40%;
    background:radial-gradient(120% 90% at 50% 8%, rgba(246,226,154,.18), transparent 52%), linear-gradient(180deg,#1a1208,#241810 60%,#0f0a05);}
  .room .banner{position:absolute;top:6%;left:50%;transform:translateX(-50%);text-align:center;z-index:3;width:92%;}
  .room .banner .kick{font-weight:600;letter-spacing:.4em;font-size:.72rem;color:var(--gold);text-transform:uppercase;}
  .room .banner h1{font-family:"Alfa Slab One",Georgia,serif;font-weight:400;text-transform:uppercase;line-height:.92;
    font-size:clamp(1.5rem,5.6vw,2.6rem);color:var(--cream);margin-top:6px;text-shadow:0 3px 0 rgba(0,0,0,.4);}
  .room .banner h1 .o{color:var(--orange);}

  .scene{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .25s ease-out;will-change:transform;}
  .floor{position:absolute;left:-30%;width:160%;bottom:-4%;height:62%;transform:rotateX(76deg);transform-origin:bottom center;z-index:0;
    background:
      linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.05) 40%, rgba(0,0,0,.5)),
      repeating-linear-gradient(90deg, rgba(212,175,55,.16) 0 1px, transparent 1px 58px),
      repeating-linear-gradient(0deg, rgba(212,175,55,.09) 0 1px, transparent 1px 58px),
      linear-gradient(#3a2817,#241710);
    box-shadow:0 0 160px rgba(0,0,0,.7) inset;}
  .spotbeam{position:absolute;top:-6%;left:50%;transform:translateX(-50%);width:70%;height:90%;z-index:1;pointer-events:none;
    background:conic-gradient(from 180deg at 50% 0, transparent 84deg, rgba(246,226,154,.13) 90deg, transparent 96deg);filter:blur(2px);}

  .podium{position:absolute;left:0;right:0;bottom:11%;z-index:2;display:flex;align-items:flex-end;justify-content:center;gap:10px;transform-style:preserve-3d;padding:0 12px;}
  .stand{display:flex;flex-direction:column;align-items:center;transform-style:preserve-3d;cursor:pointer;}
  .stand .plaque{position:relative;width:108px;border-radius:7px;overflow:hidden;border:2px solid var(--gold);background:#000;
    box-shadow:0 12px 26px rgba(0,0,0,.6), 0 0 0 4px rgba(0,0,0,.3);transition:transform .18s;}
  .stand .plaque .thmb{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;}
  .stand .plaque .pv{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:1.6rem;background:rgba(0,0,0,.2);}
  .stand .plaque .v{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.85));color:var(--gold-lt);
    font-family:"Alfa Slab One";font-size:.92rem;text-align:center;padding:14px 4px 4px;}
  .stand .crown{font-size:1.5rem;margin-bottom:2px;filter:drop-shadow(0 3px 5px rgba(0,0,0,.5));}
  .stand .col{width:104px;margin-top:0;border-radius:5px 5px 0 0;border:1px solid #5e4a1c;border-bottom:none;
    background:linear-gradient(100deg,#7c6325 0%,#caa64a 30%,#f6e29a 50%,#caa64a 70%,#7c6325 100%);
    box-shadow:0 -2px 0 rgba(255,255,255,.3) inset, 0 16px 30px rgba(0,0,0,.55);
    display:flex;align-items:flex-start;justify-content:center;}
  .stand .col .rk{font-family:"Alfa Slab One";color:#3a2c0c;font-size:1.7rem;margin-top:8px;text-shadow:0 1px 0 rgba(255,255,255,.35);}
  .stand.r1{transform:translateZ(40px);} .stand.r1 .plaque{width:128px;border-width:3px;}
  .stand.r1 .col{height:150px;width:124px;}
  .stand.r2{transform:translateZ(0) rotateY(20deg);} .stand.r2 .col{height:108px;}
  .stand.r3{transform:translateZ(0) rotateY(-20deg);} .stand.r3 .col{height:80px;}
  .stand:hover .plaque{transform:translateY(-5px) scale(1.03);}
  .stand .ref{width:108px;height:34px;margin-top:1px;border-radius:0 0 8px 8px;opacity:.32;transform:scaleY(-1);
    background:linear-gradient(#caa64a,transparent);filter:blur(1px);}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .stand.r1 .crown{animation:bob 3s ease-in-out infinite;}

  .room .cta-row{position:absolute;left:0;right:0;bottom:2.5%;z-index:4;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:0 14px;}
  .bigbtn{font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:1rem;text-decoration:none;cursor:pointer;border:none;
    padding:14px 24px;border-radius:7px;display:inline-flex;align-items:center;gap:9px;transition:transform .08s,box-shadow .08s;}
  .bigbtn.gold{color:var(--ink);background:linear-gradient(180deg,var(--gold-lt),var(--gold));border:1px solid var(--gold-dk);box-shadow:0 5px 0 var(--gold-dk);}
  .bigbtn.gold:active{transform:translateY(5px);box-shadow:0 0 0 var(--gold-dk);}
  .bigbtn.dark{color:var(--cream);background:rgba(20,13,6,.7);border:1px solid var(--line);backdrop-filter:blur(4px);}
  .room .emptyhint{position:absolute;inset:0;display:grid;place-items:center;z-index:2;color:#b39a6a;font-weight:600;text-align:center;padding:20px;}

  /* ---------- section shell ---------- */
  section.block{padding:30px 0 4px;}
  .label{font-weight:600;text-transform:uppercase;letter-spacing:.26em;font-size:.76rem;color:var(--gold);text-align:center;}
  .label::before,.label::after{content:"✦";margin:0 11px;color:var(--gold-dk);font-size:.7em;vertical-align:2px;}

  /* ---------- submit plate ---------- */
  .plate{background:linear-gradient(180deg,var(--cream),var(--cream2));color:var(--ink);border:3px solid var(--gold-dk);border-radius:8px;
    box-shadow:0 0 0 4px var(--panel),0 16px 30px rgba(0,0,0,.5);padding:18px;margin:14px auto 0;max-width:560px;}
  .drop{display:block;border:2px dashed var(--gold-dk);border-radius:6px;background:rgba(154,125,46,.08);padding:30px 16px;text-align:center;cursor:pointer;}
  .drop.drag{background:rgba(193,68,14,.12);}
  .drop .ico{font-size:2.4rem;} .drop b{display:block;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:1.02rem;margin-top:6px;}
  .drop span{display:block;color:#6b5836;font-size:.8rem;margin-top:3px;font-weight:500;}
  #file{display:none;}
  .queue{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .qitem{position:relative;width:70px;height:70px;border-radius:5px;overflow:hidden;border:2px solid var(--gold-dk);background:#000;}
  .qitem img,.qitem video{width:100%;height:100%;object-fit:cover;}
  .qitem .vt{position:absolute;left:3px;bottom:3px;background:rgba(0,0,0,.7);color:#fff;font-size:.55rem;font-weight:700;padding:1px 4px;border-radius:3px;}
  .qitem .x{position:absolute;top:2px;right:2px;width:19px;height:19px;border:none;border-radius:50%;background:var(--orange);color:#fff;font-weight:700;cursor:pointer;line-height:1;}
  .field{margin-top:12px;} .field input{width:100%;border:2px solid var(--gold-dk);border-radius:5px;padding:12px;font-size:1rem;font-family:"Oswald";font-weight:500;background:#fff;color:var(--ink);}
  .consent{font-size:.72rem;color:#6b5836;margin-top:9px;font-weight:500;}
  .gobtn{width:100%;margin-top:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:1.02rem;color:var(--cream);
    background:linear-gradient(180deg,#34250f,#241810);border:2px solid var(--gold-dk);border-radius:6px;padding:14px;cursor:pointer;box-shadow:0 4px 0 #120c06;}
  .gobtn:active{transform:translateY(4px);box-shadow:0 0 0 #120c06;}
  .gobtn[disabled]{opacity:.6;}
  .note{text-align:center;font-weight:600;color:var(--orange);margin-top:10px;display:none;} .note.on{display:block;}

  /* ---------- ranking list ---------- */
  .lead{display:grid;gap:8px;max-width:680px;margin:14px auto 0;}
  .lrow{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
    border-left:4px solid var(--gold-dk);border-radius:6px;padding:8px 12px;cursor:pointer;transition:transform .12s,box-shadow .12s;animation:fade .4s ease both;}
  .lrow:hover{transform:translateX(3px);box-shadow:0 0 16px rgba(212,175,55,.12);}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .lrow.top1{border-left-color:var(--gold);} .lrow.top2{border-left-color:#cdd3da;} .lrow.top3{border-left-color:#b9742e;}
  .lrank{font-family:"Alfa Slab One";font-size:1.1rem;width:32px;text-align:center;color:var(--gold);}
  .lthumb{width:50px;height:50px;border-radius:4px;overflow:hidden;background:#000;border:1px solid var(--gold-dk);position:relative;flex:0 0 auto;}
  .lthumb img{width:100%;height:100%;object-fit:cover;} .lthumb .pv{position:absolute;inset:0;display:grid;place-items:center;color:#fff;background:rgba(0,0,0,.25);}
  .lmeta{flex:1;min-width:0;} .lmeta .who{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--cream);}
  .lmeta .sm{color:#b39a6a;font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
  .lvotes{font-family:"Alfa Slab One";color:var(--gold);font-size:1rem;flex:0 0 auto;}

  /* ============ VIEWER (full-screen feed) ============ */
  .viewer{position:fixed;inset:0;z-index:80;background:#000;display:none;}
  .viewer.on{display:block;}
  .feed{height:100%;width:100%;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;}
  .panel{position:relative;height:100%;width:100%;scroll-snap-align:start;display:grid;place-items:center;background:#000;overflow:hidden;}
  .panel .bgblur{position:absolute;inset:-20px;background-size:cover;background-position:center;filter:blur(28px) brightness(.4);}
  .panel .stagewrap{position:relative;z-index:1;max-width:100%;max-height:100%;display:grid;place-items:center;}
  .panel video,.panel img{max-width:100vw;max-height:100vh;width:auto;height:auto;object-fit:contain;}
  .panel .meta{position:absolute;left:16px;bottom:90px;z-index:3;max-width:70%;}
  .panel .meta .rk{display:inline-block;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:.7rem;color:var(--ink);
    background:linear-gradient(180deg,var(--gold-lt),var(--gold));padding:3px 9px;border-radius:20px;margin-bottom:8px;}
  .panel .meta .who{font-family:"Alfa Slab One";font-size:1.3rem;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.7);}
  .vote-fab{position:absolute;right:16px;bottom:90px;z-index:3;display:flex;flex-direction:column;align-items:center;gap:4px;
    border:none;background:none;cursor:pointer;}
  .vote-fab .ball{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-size:1.9rem;
    background:radial-gradient(circle at 38% 32%, #ff8a3d, #c1440e);box-shadow:0 6px 18px rgba(0,0,0,.6), 0 0 0 3px rgba(246,226,154,.7);transition:transform .12s;}
  .vote-fab:active .ball{transform:scale(.88);}
  .vote-fab.pop .ball{animation:pop .3s ease;}
  @keyframes pop{40%{transform:scale(1.25)}}
  .vote-fab .vc{font-family:"Alfa Slab One";color:#fff;font-size:1rem;text-shadow:0 2px 6px rgba(0,0,0,.8);}
  .vote-fab .fly{position:absolute;top:-6px;color:var(--gold-lt);font-family:"Alfa Slab One";pointer-events:none;animation:fly .8s ease-out forwards;}
  @keyframes fly{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-44px)}}
  .viewer .close{position:absolute;top:14px;right:14px;z-index:5;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);
    background:rgba(0,0,0,.5);color:#fff;font-size:1.3rem;cursor:pointer;backdrop-filter:blur(4px);}
  .viewer .vtitle{position:absolute;top:18px;left:16px;z-index:5;font-weight:700;text-transform:uppercase;letter-spacing:.16em;font-size:.74rem;color:var(--gold);}
  .viewer .swipehint{position:absolute;left:0;right:0;bottom:34px;z-index:4;text-align:center;color:rgba(255,255,255,.6);font-size:.74rem;font-weight:600;
    text-transform:uppercase;letter-spacing:.1em;animation:fadehint 3s ease-in-out infinite;}
  @keyframes fadehint{0%,100%{opacity:.3}50%{opacity:.8}}

  .state{text-align:center;padding:44px 20px;color:#b39a6a;}
  .state .ico{font-size:2.4rem;} .state h3{font-family:"Alfa Slab One";color:var(--cream);margin-top:10px;font-size:1.15rem;}
  .spinner{width:38px;height:38px;border:5px solid rgba(212,175,55,.2);border-top-color:var(--gold);border-radius:50%;margin:0 auto 12px;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  footer{text-align:center;padding:26px 0 50px;border-top:1px solid var(--line);margin-top:16px;color:#9c8557;font-weight:500;font-size:.8rem;}
  footer a{color:var(--gold);text-decoration:none;margin:0 8px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(160%);background:#120c06;color:var(--gold-lt);font-weight:600;
    padding:12px 20px;border:1px solid var(--gold);border-radius:5px;z-index:120;transition:transform .3s;font-size:.9rem;max-width:90vw;text-align:center;}
  .toast.on{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header class="bar">
  <div class="bar-inner">
    <svg class="seal" viewBox="0 0 48 48" aria-hidden="true"><circle cx="24" cy="24" r="22" fill="#c1440e" stroke="#d4af37" stroke-width="3"/><text x="24" y="31" text-anchor="middle" font-family="Alfa Slab One,Georgia,serif" font-size="19" fill="#1d4e89">NY</text></svg>
    <div class="wm">Knicks <b>Trophy Room</b></div>
    <div class="spacer"></div>
    <button class="navbtn" id="navWatch">▶ Watch</button>
    <a class="navbtn gold" href="#submit">Submit</a>
  </div>
</header>

<!-- ===== 3D TROPHY ROOM ===== -->
<div class="room" id="room">
  <div class="banner">
    <div class="kick">The Hall of</div>
    <h1>Craziest <span class="o">Knicks</span> Tapes</h1>
  </div>
  <div class="scene" id="scene">
    <div class="floor"></div>
    <div class="spotbeam"></div>
    <div class="podium" id="podium"></div>
  </div>
  <div class="emptyhint" id="roomEmpty" style="display:none">Loading the room…</div>
  <div class="cta-row">
    <button class="bigbtn gold" id="enterBtn">▶ Enter the room</button>
    <a class="bigbtn dark" href="#submit">Add a tape</a>
  </div>
</div>

<!-- ===== SUBMIT ===== -->
<section class="block wrap" id="submit">
  <div class="label">Submit</div>
  <div class="plate">
    <label class="drop" id="drop" for="file"><div class="ico">🎞️</div><b>Add your tapes</b><span>photos or videos · add as many as you want</span></label>
    <input type="file" id="file" accept="image/*,video/*" multiple>
    <div class="queue" id="queue"></div>
    <div class="field" id="handleField" style="display:none"><input type="text" id="handle" placeholder="@handle (optional)" autocapitalize="off" autocomplete="off" maxlength="40"></div>
    <div class="consent" id="consent" style="display:none">By entering you agree your clips can appear publicly and be used in a video.</div>
    <button class="gobtn" id="submitBtn" style="display:none">Add to the room</button>
    <div class="note" id="note"></div>
  </div>
</section>

<!-- ===== RANKING ===== -->
<section class="block wrap" id="ranking">
  <div class="label">The Rankings</div>
  <div id="leadBox" class="lead"></div>
</section>

<footer>
  <div class="wrap"><a href="/">Home</a> · <a href="https://www.youtube.com/channel/UCPHlxgD-zH8MpuZ9bQDAWMA?sub_confirmation=1" target="_blank" rel="noopener">YouTube</a> · <a href="/bignose.html">Big Body Brunson</a></div>
</footer>

<!-- ===== VIEWER ===== -->
<div class="viewer" id="viewer">
  <div class="vtitle">The Tapes</div>
  <button class="close" id="closeBtn" aria-label="close">✕</button>
  <div class="feed" id="feed"></div>
  <div class="swipehint" id="swipehint">swipe up for more</div>
</div>

<div class="toast" id="toast"></div>

<script src="/knicks-config.js"></script>
<script>
(function(){
  "use strict";
  var CFG=window.KNICKS||{};
  var $=function(id){return document.getElementById(id);};
  var toastEl=$('toast');
  function toast(m){ toastEl.textContent=m; toastEl.classList.add('on'); clearTimeout(toast._t); toast._t=setTimeout(function(){toastEl.classList.remove('on');},2600); }
  function enc(s){ return encodeURIComponent(s); }
  function who(c){ return c ? (c[0]==='@'?c:'@'+c) : 'Anonymous'; }

  var model=[];

  /* ===== media urls ===== */
  function thumb(it){ var b='https://res.cloudinary.com/'+CFG.cloudName;
    return it.kind==='video' ? b+'/video/upload/w_360,h_360,c_fill,q_auto,so_0/'+it.public_id+'.jpg'
                             : b+'/image/upload/w_360,h_360,c_fill,q_auto,f_auto/v'+it.version+'/'+it.public_id+'.'+it.format; }
  function full(it){ var b='https://res.cloudinary.com/'+CFG.cloudName;
    return it.kind==='video' ? {poster:b+'/video/upload/w_900,q_auto,so_0/'+it.public_id+'.jpg', src:b+'/video/upload/w_900,q_auto/v'+it.version+'/'+it.public_id+'.mp4'}
                             : {src:b+'/image/upload/c_limit,w_1000,q_auto,f_auto/v'+it.version+'/'+it.public_id+'.'+it.format}; }

  /* ===== votes (unlimited) ===== */
  var VB=CFG.voteBase, NS=CFG.voteNamespace, hitQ=[], flushing=false;
  function getVotes(id){ return fetch(VB+'/get/'+NS+'/'+enc(id)).then(function(r){return r.ok?r.json():{value:0};}).then(function(j){return (j&&j.value)||0;}).catch(function(){return 0;}); }
  function enqueueHit(id){ hitQ.push(id); if(!flushing) flush(); }
  function flush(){ if(!hitQ.length){flushing=false;return;} flushing=true; var id=hitQ.shift(); fetch(VB+'/hit/'+NS+'/'+enc(id)).then(s,s); function s(){ setTimeout(flush,110); } }
  function castVote(it){ it.votes++; enqueueHit(it.public_id); scheduleRender(); }
  var rt=null; function scheduleRender(){ clearTimeout(rt); rt=setTimeout(function(){ renderPodium(); renderRank(); syncViewerCounts(); },240); }

  /* ===== 3D PODIUM (top 3) ===== */
  function renderPodium(){
    var pod=$('podium'); var top=model.slice().sort(byVotes).slice(0,3);
    if(!top.length){ pod.innerHTML=''; $('roomEmpty').style.display='grid'; $('roomEmpty').textContent='No tapes yet — be the first on the podium.'; return; }
    $('roomEmpty').style.display='none';
    var order=[top[1],top[0],top[2]]; // visual: 2nd, 1st(center), 3rd
    var ranks=[2,1,3];
    pod.innerHTML='';
    order.forEach(function(it,i){
      if(!it) return; var rank=ranks[i];
      var st=document.createElement('div'); st.className='stand r'+rank;
      var crown=rank===1?'👑':(rank===2?'🥈':'🥉');
      var pv=it.kind==='video'?'<div class="pv">▶</div>':'';
      st.innerHTML='<div class="crown">'+crown+'</div>'+
        '<div class="plaque"><img class="thmb" src="'+thumb(it)+'" alt="">'+pv+'<div class="v">'+it.votes+'</div></div>'+
        '<div class="col"><div class="rk">'+rank+'</div></div>'+
        '<div class="ref" style="background:linear-gradient(#caa64a,transparent)"></div>';
      st.addEventListener('click',function(){ openViewer(it.public_id); });
      pod.appendChild(st);
    });
  }
  function byVotes(a,b){ return b.votes-a.votes; }

  /* ===== ranking list ===== */
  function renderRank(){
    var box=$('leadBox'); var all=model.slice().sort(byVotes);
    if(!all.length){ box.innerHTML='<div class="state"><p>No tapes yet.</p></div>'; return; }
    box.innerHTML='';
    all.forEach(function(it,i){
      var row=document.createElement('div'); row.className='lrow'+(i<3?' top'+(i+1):'');
      var rk=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      var pv=it.kind==='video'?'<div class="pv">▶</div>':'';
      row.innerHTML='<div class="lrank">'+rk+'</div><div class="lthumb"><img src="'+thumb(it)+'">'+pv+'</div>'+
        '<div class="lmeta"><div class="who">'+who(it.caption)+'</div><div class="sm">'+(it.kind==='video'?'film':'photo')+'</div></div>'+
        '<div class="lvotes">'+it.votes+'</div>';
      row.addEventListener('click',function(){ openViewer(it.public_id); });
      box.appendChild(row);
    });
  }

  /* ===== VIEWER feed ===== */
  var viewer=$('viewer'), feed=$('feed'), io=null, built=false;
  function buildFeed(){
    feed.innerHTML=''; var ordered=model.slice().sort(byVotes);
    ordered.forEach(function(it,i){
      var f=full(it);
      var panel=document.createElement('div'); panel.className='panel'; panel.dataset.id=it.public_id;
      var media= it.kind==='video'
        ? '<video src="'+f.src+'" poster="'+f.poster+'" muted loop playsinline preload="metadata"></video>'
        : '<img src="'+f.src+'" alt="">';
      var bg = it.kind==='video' ? f.poster : f.src;
      panel.innerHTML=
        '<div class="bgblur" style="background-image:url('+bg+')"></div>'+
        '<div class="stagewrap">'+media+'</div>'+
        '<div class="meta"><span class="rk">#'+(i+1)+' · '+(it.kind==='video'?'FILM':'PHOTO')+'</span><div class="who">'+who(it.caption)+'</div></div>'+
        '<button class="vote-fab" data-id="'+it.public_id+'"><span class="ball">🏀</span><span class="vc">'+it.votes+'</span></button>';
      panel.querySelector('.vote-fab').addEventListener('click',function(){
        castVote(it); this.classList.remove('pop'); void this.offsetWidth; this.classList.add('pop');
        var fly=document.createElement('span'); fly.className='fly'; fly.textContent='+1'; this.appendChild(fly); setTimeout(function(){fly.remove();},800);
        this.querySelector('.vc').textContent=it.votes;
      });
      // tap media to play/pause video + retry while Cloudinary transcodes a fresh upload
      if(it.kind==='video'){ var vd=panel.querySelector('video');
        panel.querySelector('.stagewrap').addEventListener('click',function(){ if(vd){ vd.paused?vd.play():vd.pause(); } });
        var tries=0; vd.addEventListener('error',function(){ if(tries++<6){ setTimeout(function(){ vd.load(); vd.play().catch(function(){}); }, 1600); } });
      }
      feed.appendChild(panel);
    });
    if(io) io.disconnect();
    io=new IntersectionObserver(function(es){ es.forEach(function(e){ var v=e.target.querySelector('video'); if(!v)return; if(e.isIntersecting){ v.play().catch(function(){}); } else { v.pause(); } }); },{threshold:.6,root:feed});
    feed.querySelectorAll('.panel').forEach(function(p){ io.observe(p); });
    built=true;
  }
  function syncViewerCounts(){ model.forEach(function(it){ var b=feed.querySelector('.vote-fab[data-id="'+it.public_id.replace(/"/g,'\\"')+'"] .vc'); if(b) b.textContent=it.votes; }); }
  function openViewer(focusId){
    if(!model.length){ toast('no tapes yet — add one!'); return; }
    buildFeed(); viewer.classList.add('on'); document.body.classList.add('locked');
    if(location.hash!=='#watch') history.replaceState(null,'','#watch');
    requestAnimationFrame(function(){
      if(focusId){ var p=feed.querySelector('.panel[data-id="'+focusId.replace(/"/g,'\\"')+'"]'); if(p) p.scrollIntoView(); }
      else feed.scrollTop=0;
      var first=feed.querySelector('.panel video'); if(first) first.play().catch(function(){});
    });
    setTimeout(function(){ var s=$('swipehint'); if(s) s.style.display='none'; },4000);
  }
  function closeViewer(){ viewer.classList.remove('on'); document.body.classList.remove('locked');
    feed.querySelectorAll('video').forEach(function(v){ v.pause(); }); if(io) io.disconnect();
    if(location.hash==='#watch') history.replaceState(null,'',location.pathname); }
  $('navWatch').addEventListener('click',function(){ openViewer(); });
  $('enterBtn').addEventListener('click',function(){ openViewer(); });
  $('closeBtn').addEventListener('click',closeViewer);
  window.addEventListener('keydown',function(e){ if(e.key==='Escape'&&viewer.classList.contains('on')) closeViewer(); });

  /* ===== parallax (desktop) ===== */
  var scene=$('scene');
  if(window.matchMedia('(pointer:fine)').matches){
    $('room').addEventListener('mousemove',function(e){
      var r=this.getBoundingClientRect(); var dx=(e.clientX-r.left)/r.width-.5, dy=(e.clientY-r.top)/r.height-.5;
      scene.style.transform='rotateY('+(dx*8)+'deg) rotateX('+(-dy*5)+'deg)';
    });
    $('room').addEventListener('mouseleave',function(){ scene.style.transform=''; });
  }

  /* ===== UPLOAD (multi) ===== */
  var fileInput=$('file'), drop=$('drop'), queueEl=$('queue'), handleEl=$('handle'), submitBtn=$('submitBtn'), noteEl=$('note');
  var queue=[];
  function refreshQueue(){
    queueEl.innerHTML='';
    queue.forEach(function(q,i){ var d=document.createElement('div'); d.className='qitem';
      d.innerHTML=q.isVideo?('<video src="'+q.url+'" muted></video><span class="vt">FILM</span>'):('<img src="'+q.url+'">');
      var x=document.createElement('button'); x.className='x'; x.textContent='×';
      x.addEventListener('click',function(ev){ev.preventDefault();URL.revokeObjectURL(q.url);queue.splice(i,1);refreshQueue();});
      d.appendChild(x); queueEl.appendChild(d); });
    var has=queue.length>0;
    $('handleField').style.display=has?'block':'none'; $('consent').style.display=has?'block':'none'; submitBtn.style.display=has?'block':'none';
    submitBtn.textContent='Add '+(queue.length||'')+' to the room'; drop.querySelector('b').textContent=has?'Add more':'Add your tapes';
  }
  function addFiles(list){ Array.prototype.forEach.call(list,function(f){ if(!/^(image|video)\//.test(f.type))return; queue.push({file:f,isVideo:/^video\//.test(f.type),url:URL.createObjectURL(f)}); }); refreshQueue(); }
  function prep(file){ return new Promise(function(res){ if(/^video\//.test(file.type))return res(file);
    if(!window.createImageBitmap)return res(file);
    createImageBitmap(file,{imageOrientation:'from-image'}).then(function(b){ var s=Math.min(1,2048/Math.max(b.width,b.height));
      if(s>=1&&file.size<=9e6){if(b.close)b.close();return res(file);} var cw=Math.round(b.width*s),ch=Math.round(b.height*s);
      var cv=document.createElement('canvas');cv.width=cw;cv.height=ch;cv.getContext('2d').drawImage(b,0,0,cw,ch);if(b.close)b.close();
      cv.toBlob(function(o){res(o&&o.size>0?o:file);},'image/jpeg',.85);}).catch(function(){res(file);}); }); }
  function uploadOne(file,handle){ var fd=new FormData(); fd.append('file',file,file.name||'entry'); fd.append('upload_preset',CFG.uploadPreset); fd.append('tags',CFG.tag);
    if(handle)fd.append('context','caption='+handle.replace(/\|/g,' ')); return fetch('https://api.cloudinary.com/v1_1/'+CFG.cloudName+'/auto/upload',{method:'POST',body:fd}).then(function(r){return r.json().then(function(j){if(!r.ok)throw j;return j;});}); }
  submitBtn.addEventListener('click',function(){
    if(!queue.length||!CFG.cloudName)return; var handle=(handleEl.value||'').trim(); var items=queue.slice(),total=items.length,ok=0;
    submitBtn.disabled=true; noteEl.classList.add('on');
    (function next(i){ if(i>=items.length){ queue.forEach(function(q){URL.revokeObjectURL(q.url);}); queue=[]; refreshQueue(); submitBtn.disabled=false;
        noteEl.textContent=ok+' added to the room ✦'; handleEl.value=''; setTimeout(function(){noteEl.classList.remove('on');},2600);
        $('ranking').scrollIntoView({behavior:'smooth'}); return; }
      noteEl.textContent='Uploading '+(i+1)+' of '+total+'…';
      prep(items[i].file).then(function(r){return uploadOne(r,handle);}).then(function(res){ ok++; if(res&&res.public_id){
        model.unshift({public_id:res.public_id,kind:(res.resource_type==='video'?'video':'image'),version:res.version,format:res.format,caption:handle.replace(/^@+/,''),votes:0});
        renderPodium(); renderRank(); } }).catch(function(){}).then(function(){ next(i+1); }); })(0);
  });
  fileInput.addEventListener('change',function(e){ if(e.target.files.length)addFiles(e.target.files); fileInput.value=''; });
  ['dragenter','dragover'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.add('drag');}); });
  ['dragleave','drop'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove('drag');}); });
  drop.addEventListener('drop',function(e){ if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files); });

  /* ===== LOAD ===== */
  function grab(kind){ var url='https://res.cloudinary.com/'+CFG.cloudName+'/'+kind+'/list/'+CFG.tag+'.json?cb='+Date.now();
    return fetch(url,{cache:'no-store'}).then(function(r){return r.ok?r.json():{resources:[]};}).then(function(j){ return (j.resources||[]).map(function(x){
      return {public_id:x.public_id,kind:kind,version:x.version,format:x.format,caption:(x.context&&x.context.custom&&x.context.custom.caption)||'',votes:0}; }); }).catch(function(){return [];}); }
  if(!CFG.cloudName){ $('roomEmpty').style.display='grid'; $('roomEmpty').textContent='Not set up.'; return; }
  $('roomEmpty').style.display='grid';
  Promise.all([grab('image'),grab('video')]).then(function(p){ model=p[0].concat(p[1]); renderPodium(); renderRank();
    Promise.all(model.map(function(it){return getVotes(it.public_id).then(function(v){it.votes=Math.max(it.votes,v);});})).then(function(){ renderPodium(); renderRank(); if(location.hash==='#watch') openViewer(); });
  });
  setInterval(function(){ if(!model.length)return; Promise.all(model.map(function(it){return getVotes(it.public_id).then(function(v){it.votes=Math.max(it.votes,v);});})).then(function(){ renderPodium(); renderRank(); syncViewerCounts(); }).catch(function(){}); },13000);
})();
</script>
</body>
