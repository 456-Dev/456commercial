<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#006BB6">
<title>The Gallery — photos from MSG</title>

<meta property="og:title" content="The MSG Gallery">
<meta property="og:description" content="Everyone's photos with the head at the Garden.">
<meta property="og:image" content="https://www.456solutions.com/assets/bignose-avatar.jpg">
<meta property="og:url" content="https://www.456solutions.com/gallery.html">
<meta property="og:type" content="website">

<link rel="icon" href="favicon32x32.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="favicon160x160.png">

<style>
  :root{ --blue:#006BB6; --orange:#F58426; --ink:#0a0a0a; --paper:#fbfaf7; --card:#fff; --muted:#6b6b6b; font-size:16px; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{font-family:"Helvetica Neue",Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;opacity:.05;pointer-events:none;background:repeating-linear-gradient(45deg,var(--blue) 0 24px,transparent 24px 48px);}
  img{max-width:100%;display:block;}
  .wrap{width:100%;max-width:900px;margin:0 auto;padding:0 16px;}

  header.bar{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:3px solid var(--ink);}
  .bar-inner{max-width:900px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:10px;}
  .bar .back{font-weight:800;text-decoration:none;color:var(--ink);font-size:.9rem;display:inline-flex;align-items:center;gap:6px;}
  .bar .title{font-weight:900;font-size:1.05rem;letter-spacing:-.02em;}
  .bar .spacer{flex:1;}
  .bar .add{display:inline-flex;align-items:center;gap:6px;background:var(--orange);color:var(--ink);text-decoration:none;border:2.5px solid var(--ink);border-radius:999px;padding:8px 14px;font-weight:800;font-size:.8rem;white-space:nowrap;box-shadow:0 3px 0 var(--ink);}
  .bar .add:active{transform:translateY(3px);box-shadow:0 0 0 var(--ink);}

  .head{text-align:center;padding:22px 0 8px;}
  .head h1{font-size:clamp(2rem,9vw,3rem);font-weight:900;text-transform:uppercase;letter-spacing:-.03em;line-height:.95;}
  .head h1 .o{color:var(--orange);}
  .head p{font-weight:600;color:#333;margin-top:8px;}
  #count{font-weight:800;color:var(--blue);}

  .grid{column-count:2;column-gap:12px;padding:18px 0 60px;}
  @media (min-width:620px){ .grid{column-count:3;} }
  @media (min-width:860px){ .grid{column-count:4;} }
  .tile{break-inside:avoid;margin:0 0 12px;border:3px solid var(--ink);border-radius:12px;overflow:hidden;background:#111;box-shadow:0 5px 0 var(--ink);position:relative;}
  .tile img{width:100%;height:auto;display:block;}
  .tile .cap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.75));color:#fff;font-weight:800;font-size:.78rem;padding:18px 8px 6px;}

  .state{text-align:center;padding:60px 20px;}
  .state .ico{font-size:3rem;}
  .state h2{font-weight:900;text-transform:uppercase;margin-top:10px;font-size:1.3rem;}
  .state p{color:var(--muted);font-weight:600;margin-top:8px;max-width:34ch;margin-left:auto;margin-right:auto;}
  .state a.add{display:inline-flex;align-items:center;gap:8px;margin-top:18px;background:var(--orange);color:var(--ink);text-decoration:none;border:3px solid var(--ink);border-radius:12px;padding:13px 20px;font-weight:900;box-shadow:0 5px 0 var(--ink);}
  .state code{background:#f0f0ee;border:1px solid #ddd;border-radius:6px;padding:1px 6px;font-size:.85em;}
  .spinner{width:42px;height:42px;border:5px solid #d8d8d8;border-top-color:var(--blue);border-radius:50%;margin:0 auto;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<header class="bar">
  <div class="bar-inner">
    <a class="back" href="index.html">← back</a>
    <span class="title">🖼 The Gallery</span>
    <div class="spacer"></div>
    <a class="add" href="index.html">📸 Add yours</a>
  </div>
</header>

<div class="wrap">
  <div class="head">
    <h1>PHOTOS FROM <span class="o">MSG</span></h1>
    <p>Everyone who met the head at the Garden. <span id="count"></span></p>
  </div>

  <div id="state" class="state"><div class="spinner"></div><p style="margin-top:16px">loading the gallery…</p></div>
  <div id="grid" class="grid" hidden></div>
</div>

<script src="gallery-config.js"></script>
<script>
(function(){
  "use strict";
  var cfg=window.MSG_GALLERY||{};
  var stateEl=document.getElementById('state');
  var gridEl=document.getElementById('grid');
  var countEl=document.getElementById('count');

  function showState(html){ stateEl.innerHTML=html; stateEl.hidden=false; gridEl.hidden=true; }

  if(!cfg.cloudName){
    showState('<div class="ico">🛠️</div><h2>Gallery not set up yet</h2>'+
      '<p>Add your Cloudinary <code>cloudName</code> and <code>uploadPreset</code> in <code>gallery-config.js</code> to switch this on.</p>'+
      '<a class="add" href="index.html">← back</a>');
    return;
  }

  var url='https://res.cloudinary.com/'+cfg.cloudName+'/image/list/'+(cfg.galleryTag||'approved')+'.json';

  fetch(url,{cache:'no-store'}).then(function(r){
    if(!r.ok) throw new Error('http '+r.status);
    return r.json();
  }).then(function(data){
    var res=(data&&data.resources)||[];
    if(!res.length){
      showState('<div class="ico">📭</div><h2>No photos yet</h2><p>Be the first to add yours from the Garden.</p><a class="add" href="index.html">📸 Add your photo</a>');
      return;
    }
    // newest first
    res.sort(function(a,b){ return (b.version||0)-(a.version||0); });
    var frag=document.createDocumentFragment();
    res.forEach(function(it){
      var src='https://res.cloudinary.com/'+cfg.cloudName+'/image/upload/c_limit,w_800,q_auto,f_auto/v'+it.version+'/'+it.public_id+'.'+it.format;
      var tile=document.createElement('div'); tile.className='tile';
      var img=document.createElement('img'); img.loading='lazy'; img.alt='photo from MSG'; img.src=src;
      tile.appendChild(img);
      var cap=(it.context&&it.context.custom&&it.context.custom.caption)||'';
      if(cap){ var c=document.createElement('div'); c.className='cap'; c.textContent=cap; tile.appendChild(c); }
      frag.appendChild(tile);
    });
    gridEl.appendChild(frag);
    countEl.textContent='('+res.length+' so far)';
    stateEl.hidden=true; gridEl.hidden=false;
  }).catch(function(){
    showState('<div class="ico">⚠️</div><h2>Couldn’t load the gallery</h2>'+
      '<p>If you just set it up, make sure <strong>Resource list</strong> is enabled in Cloudinary → Settings → Security.</p>'+
      '<a class="add" href="index.html">← back</a>');
  });
})();
</script>
</body>
</html>
